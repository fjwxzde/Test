name: 测试 DuckStudio.CatFood

on:
  workflow_dispatch:

permissions: {}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: 
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: 签出测试仓库
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: Test
          persist-credentials: false

      - name: 签出 DuckStudio.CatFood 仓库
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: DuckDuckStudio/DuckStudio.CatFood
          ref: deps/dotnet/Spectre.Console/0.55.0
          path: DuckStudio.CatFood
          persist-credentials: false

      - name: 设置 .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: 打包 DuckStudio.CatFood
        shell: bash
        run: dotnet build "DuckStudio.CatFood/src/DuckStudio.CatFood" -c Release

      - name: 运行 CatFoodTests
        shell: bash
        run: dotnet run --project "Test/CatFoodTests"

      - name: 运行 DuckStudio.CatFood.Tests
        shell: bash
        run: dotnet test "Test/CatFoodTests"
